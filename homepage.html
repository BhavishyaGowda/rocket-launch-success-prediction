<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocket Launch Success Prediction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .bg-space {
            /* FIX: I've updated the URL to a permanent,
              high-quality image from Unsplash.
            */
            background-image: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .glass-effect {
            background: rgba(17, 24, 39, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-space text-white">

    <div id="app" class="relative min-h-screen w-full">

        <header class="fixed top-0 left-0 right-0 z-50 transition-all duration-300">
            <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
                <a href="#" class="text-2xl font-bold tracking-wider hover:text-cyan-400 transition-colors">
                    RocketLaunch
                </a>
                </nav>
        </header>

        <main id="homepage" class="min-h-screen flex items-center justify-center">
            <div class="container mx-auto px-6 text-center">
                <div class="glass-effect rounded-3xl p-8 md:p-16 max-w-4xl mx-auto">
                    <h1 class="text-4xl md:text-6xl font-black leading-tight mb-4">
                        Rocket Launch Success Prediction  
                    </h1>
                    <p class="text-lg md:text-xl text-gray-300 mb-8 max-w-2xl mx-auto">
                        Leveraging machine learning to analyze historical launch data and predict the outcome of future rocket missions with high accuracy.
                    </p>
                    </div>
            </div>
        </main>

        </div>

    <script>
        // --- Add a subtle scroll effect to the header ---
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 10) {
                header.classList.add('glass-effect');
            } else {
                header.classList.remove('glass-effect');
            }
        });

        // All other JavaScript for page switching has been removed.
    </script>
</body>
</html>
